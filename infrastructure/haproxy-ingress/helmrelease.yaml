apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: haproxy-ingress
  namespace: oct-gitops-ns
spec:
  releaseName: haproxy-ingress
  chart:
    spec:
      chart: haproxy-ingress
      version: "0.14.7"
      sourceRef:
        kind: HelmRepository
        name: haproxy-ingress
        namespace: oct-gitops-ns
  interval: 1h
  install:
    createNamespace: false
    remediation:
      retries: 3
  values:
    controller:
      # Make this the cluster default ingress controller so all Octave ingresses
      # are picked up without per-ingress class annotations.
      ingressClassResource:
        enabled: true
        default: true
        name: haproxy
      # Watch ingresses in all namespaces (Octave apps live in the `octave` ns).
      watchIngressWithoutClass: false
      replicaCount: 1
      nodeSelector:
        kubernetes.io/os: linux
      service:
        type: LoadBalancer
        # Static public IP is bound by name via the azure-pip-name annotation
        # below. The IP must be a Standard-SKU, Static public IP pre-created in
        # the cluster node resource group (MC_*). See AZURE-SETUP.md step 9.
        externalTrafficPolicy: Local
        annotations:
          service.beta.kubernetes.io/azure-load-balancer-internal: "false"
          service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
          service.beta.kubernetes.io/azure-pip-name: octave-dev-pip
      config:
        # Enable HAProxy to honour X-Forwarded-* headers from the Azure LB.
        forwarded-for: "add"
        # Larger buffers for the API responses, mirroring the nginx setup.
        timeout-client: "60s"
        timeout-server: "60s"
