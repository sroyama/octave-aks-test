# TODO: Deploying this way may cause race-conditions. See https://external-secrets.io/latest/examples/gitops-using-fluxcd/, and https://github.com/fluxcd/flux2-kustomize-helm-example
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  interval: 5m
  chart:
    spec:
      chart: external-secrets
      version: "0.14.4"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
  values:
    installCRDs: true
