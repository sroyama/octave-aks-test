apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonAnnotations:
  octave-overlay: dev

namespace: octave-dev

resources:
  - ../../base
  - azure-key-vault-secret-store.yaml

# Dev cluster runs a single, general-purpose node pool — it does NOT have the
# dedicated, tainted perf node pools (np=pixel_smart / fdaparser / shadowgram)
# used by octave-perf-aks. These patches make the perf-oriented services
# schedulable on the default nodes:
#   - drop the nodeSelector that pins them to missing node pools
#   - shrink the perf-sized CPU/memory requests to dev-sized values
#   - run a single pixelsmart replica (the HPA pins 12 for load testing)
# Tolerations are left in place; they are harmless on untainted nodes.

# Hostname patches are defined below (in the single patches: block after configMapGenerator).
# This prevents duplicate patches: keys, which would cause earlier patches to be ignored.

# Image pins for the dev/review cluster.
#
# The base manifests reference ":latest" tags from the dev ACR so the cluster is
# easy to update. Pin specific, reproducible tags here when you need a frozen
# build. Example (uncomment + set real tags):
#
# images:
#   - name: acrdev01global-hudngze7h7hcd6gw.azurecr.io/octave/octave-webapi-debug
#     newTag: 1.1.xxxxx-main
#   - name: acrdev01global-hudngze7h7hcd6gw.azurecr.io/octave/octave-mockharmonyapi-webapi
#     newTag: latest
#   - name: acrdev01global-hudngze7h7hcd6gw.azurecr.io/octave/octave-mockddss-webapi
#     newTag: latest

# ---------------------------------------------------------------------------
# Cluster-specific: hostname
#
# The base manifests use "octave.example.com" as a placeholder.
# The patches below inject the real dev hostname into every Ingress host/TLS
# field, every auth-signin annotation, and every env var that contains the URL.
# When adding a new cluster, copy this section to the new overlay and replace
# the hostname throughout.
# ---------------------------------------------------------------------------

configMapGenerator:
# harmony-ui-mock serves a browser-side config.json whose URLs must point at
# this cluster's hostname.  Each overlay owns its own copy of this file.
- name: harmony-ui-mock-config
  files:
  - config.json=harmony-ui-mock-config.json

patches:
  # --- Namespace override ---
  # Rename the base namespace from "octave" to "octave-dev" for this overlay.
  - target:
      kind: Namespace
      name: octave
    patch: |
      - op: replace
        path: /metadata/name
        value: octave-dev

  # SecretStore (external-secrets) also needs explicit namespace override.
  - target:
      kind: SecretStore
    patch: |
      - op: replace
        path: /metadata/namespace
        value: octave-dev

  # --- Performance resource downsizing (perf services run on generic nodes in dev) ---
  
  # Only one pixelsmart pod in dev (base HPA pins min=max=12 for perf runs).
  - target:
      kind: HorizontalPodAutoscaler
      name: octave-pixelsmart-generation-webapi
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1

  - target:
      kind: Deployment
      name: octave-pixelsmart-generation-webapi
    patch: |
      - op: remove
        path: /spec/template/spec/nodeSelector
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"

  - target:
      kind: Deployment
      name: octave-fdaparser-webapi
    patch: |
      - op: remove
        path: /spec/template/spec/nodeSelector
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "250m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"

  - target:
      kind: Deployment
      name: octave-shadowgram-webapi
    patch: |
      - op: remove
        path: /spec/template/spec/nodeSelector
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "250m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"

  # octave-rdb-webapi's appsettings.json defines a gRPC Kestrel endpoint on
  # https://0.0.0.0:7180 with no certificate, so the host crashes on startup.
  # Rebind the gRPC endpoint to HTTP/2 cleartext (h2c) on :5000.
  - target:
      kind: Deployment
      name: octave-rdb-webapi
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: Kestrel__Endpoints__Grpc__Url
          value: "http://0.0.0.0:5000"

  # --- Hostname patches (cluster-specific: octave-dev.topcon.app) ---
  # The base manifests use "octave.example.com" as a placeholder.
  # Patches below inject the real dev hostname into every Ingress host/TLS field,
  # every auth-signin annotation, and every env var that contains a URL.
  # When adding a new cluster (e.g., overlays/test), copy this section and
  # replace the hostname throughout.
  
  - target:
      kind: Ingress
      name: octave-client-ingress
    patch: |
      - op: replace
        path: /metadata/annotations/haproxy-ingress.github.io~1auth-signin
        value: "https://octave-dev.topcon.app/oauth2/start?rd=%[path]"
      - op: replace
        path: /spec/rules/0/host
        value: octave-dev.topcon.app
      - op: replace
        path: /spec/tls/0/hosts/0
        value: octave-dev.topcon.app

  - target:
      kind: Ingress
      name: octave-webapi-ingress
    patch: |
      - op: replace
        path: /metadata/annotations/haproxy-ingress.github.io~1auth-signin
        value: "https://octave-dev.topcon.app/oauth2/start?rd=%[path]"
      - op: replace
        path: /spec/rules/0/host
        value: octave-dev.topcon.app
      - op: replace
        path: /spec/tls/0/hosts/0
        value: octave-dev.topcon.app

  - target:
      kind: Ingress
      name: harmony-ui-mock-ingress
    patch: |
      - op: replace
        path: /metadata/annotations/haproxy-ingress.github.io~1auth-signin
        value: "https://octave-dev.topcon.app/oauth2/start?rd=%[path]"
      - op: replace
        path: /spec/rules/0/host
        value: octave-dev.topcon.app
      - op: replace
        path: /spec/tls/0/hosts/0
        value: octave-dev.topcon.app

  - target:
      kind: Ingress
      name: oauth2-proxy-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: octave-dev.topcon.app
      - op: replace
        path: /spec/tls/0/hosts/0
        value: octave-dev.topcon.app

  - target:
      kind: Ingress
      name: harmony-api-mock-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: octave-dev.topcon.app
      - op: replace
        path: /spec/tls/0/hosts/0
        value: octave-dev.topcon.app

  - target:
      kind: ConfigMap
      name: oauth2-proxy-config
    patch: |
      - op: replace
        path: /data/OAUTH2_PROXY_REDIRECT_URL
        value: "https://octave-dev.topcon.app/oauth2/callback"

  - target:
      kind: Deployment
      name: octave-client
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "https://octave-dev.topcon.app/octave"
