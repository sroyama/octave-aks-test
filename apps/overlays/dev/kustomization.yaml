apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonAnnotations:
  octave-overlay: dev

resources:
  - ../../base
  - azure-key-vault-secret-store.yaml

# Dev cluster runs a single, general-purpose node pool — it does NOT have the
# dedicated, tainted perf node pools (np=pixel_smart / fdaparser / shadowgram)
# used by octave-perf-aks. These patches make the perf-oriented services
# schedulable on the default nodes:
#   - drop the nodeSelector that pins them to missing node pools
#   - shrink the perf-sized CPU/memory requests to dev-sized values
#   - run a single pixelsmart replica (the HPA pins 12 for load testing)
# Tolerations are left in place; they are harmless on untainted nodes.
patches:
  # Only one pixelsmart pod in dev (base HPA pins min=max=12 for perf runs).
  - target:
      kind: HorizontalPodAutoscaler
      name: octave-pixelsmart-generation-webapi
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1

  - target:
      kind: Deployment
      name: octave-pixelsmart-generation-webapi
    patch: |
      - op: remove
        path: /spec/template/spec/nodeSelector
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"

  - target:
      kind: Deployment
      name: octave-fdaparser-webapi
    patch: |
      - op: remove
        path: /spec/template/spec/nodeSelector
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "250m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"

  - target:
      kind: Deployment
      name: octave-shadowgram-webapi
    patch: |
      - op: remove
        path: /spec/template/spec/nodeSelector
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "250m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"

  # octave-rdb-webapi's appsettings.json defines a gRPC Kestrel endpoint on
  # https://0.0.0.0:7180 with no certificate, so the host crashes on startup
  # ("Unable to configure HTTPS endpoint. No server certificate was specified").
  # Because Kestrel:Endpoints is set in appsettings, Kestrel IGNORES
  # ASPNETCORE_URLS (http://+:5000) entirely, so nothing listens on :5000 — yet
  # the Service exposes 5000 and octave-webapi dials octave-rdb-webapi-service:5000.
  # Rebind the gRPC endpoint to HTTP/2 cleartext (h2c) on :5000 so it has no cert
  # requirement AND lines up with the Service port that octave-webapi calls.
  - target:
      kind: Deployment
      name: octave-rdb-webapi
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: Kestrel__Endpoints__Grpc__Url
          value: "http://0.0.0.0:5000"

# Image pins for the dev/review cluster.
#
# The base manifests reference ":latest" tags from the dev ACR so the cluster is
# easy to update. Pin specific, reproducible tags here when you need a frozen
# build. Example (uncomment + set real tags):
#
# images:
#   - name: acrdev01global-hudngze7h7hcd6gw.azurecr.io/octave/octave-webapi-debug
#     newTag: 1.1.xxxxx-main
#   - name: acrdev01global-hudngze7h7hcd6gw.azurecr.io/octave/octave-mockharmonyapi-webapi
#     newTag: latest
#   - name: acrdev01global-hudngze7h7hcd6gw.azurecr.io/octave/octave-mockddss-webapi
#     newTag: latest
