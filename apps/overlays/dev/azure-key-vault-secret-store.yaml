apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-key-vault-secret-store
  namespace: octave
spec:
  provider:
    azurekv:
      authType: ManagedIdentity
      # TODO: replace with the dev cluster's kubelet/workload managed-identity
      # client id and tenant id, and the dev Key Vault URL. These are
      # environment-specific and must NOT be hard-coded secrets — only IDs/URLs.
      # To get cluster's client id, run the command 
      # z aks show -g octave-aks-test-rg -n octave-dev-cluster --query identityProfile.kubeletidentity.clientId -o tsv
      identityId: "32431dd3-749b-402a-a606-7cd20e2d709d"
      tenantId: "96c2c3ba-19d3-47b6-ba0b-8f7471bd1f14"
      vaultUrl: "https://octave-aks-test-kv.vault.azure.net/"