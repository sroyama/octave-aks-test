apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: octave

resources:
- octave-client-deployment.yaml
- octave-client-service.yaml
- octave-client-ingress.yaml

configMapGenerator:
- name: octave-client-entrypoint
  files:
  - entrypoint.sh=./data/entrypoint.sh

labels:
  - pairs:
      octave-component: octave-client
