apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: octave

resources:
- uimock-deployment.yaml
- uimock-service.yaml
- uimock-ingress.yaml

# NOTE: harmony-ui-mock-config ConfigMap is NOT generated here.
# Each overlay provides it via its own configMapGenerator so the
# hostname and URLs remain cluster-specific.

labels:
  - pairs:
      octave-component: harmony-ui-mock
