apiVersion: v1
kind: Service
metadata:
  name: pacs-arc-service
spec:
  selector:
    app: pacs-arc
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: https
    port: 8443
    targetPort: 8443
  - name: admin
    port: 9990
    targetPort: 9990
  - name: admin-https
    port: 9993
    targetPort: 9993
  - name: dicom
    port: 11112
    targetPort: 11112
  - name: dicom-tls
    port: 2762
    targetPort: 2762
  - name: hl7
    port: 2575
    targetPort: 2575
  - name: hl7-tls
    port: 12575
    targetPort: 12575
  clusterIP: None
  type: ClusterIP
