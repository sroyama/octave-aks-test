apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak-mssql
spec:
  serviceName: keycloak-mssql-svc
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-mssql
  template:
    metadata:
      labels:
        app: keycloak-mssql
    spec:
      securityContext:
        fsGroup: 10001 # This and securityContext below on the container are fixes to "Error: The system directory [/.system] could not be created."
                       # Future TODO: Check if we can remove the container securityContext and just use the pod securityContext.
      containers:
      - name: mssql
        image: mcr.microsoft.com/mssql/server:2022-latest
        securityContext:
          runAsUser: 10001
          runAsNonRoot: false
        ports:
        - containerPort: 1433
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: SA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-mssql-secret
              key: SA_PASSWORD
        volumeMounts:
        - name: mssql-data
          mountPath: "/var/opt/mssql"
        readinessProbe:
          tcpSocket:
            port: 1433
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 5
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            # Note that for mssql 2022, the tools are mssql-tools18, not mssql-tools.
            - "/opt/mssql-tools18/bin/sqlcmd -C -S localhost,1433 -U sa -P $SA_PASSWORD -Q 'SELECT 1'"
          initialDelaySeconds: 30
          periodSeconds: 120
          timeoutSeconds: 30
          failureThreshold: 5
  volumeClaimTemplates:
  - metadata:
      name: mssql-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
