apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-mssql-secret-es
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: SecretStore
    name: azure-key-vault-secret-store

  target:
    name: keycloak-mssql-secret
    creationPolicy: Owner

  data:
  - secretKey: SA_PASSWORD
    remoteRef:
      key: secret/keycloak-mssql-SA-PASSWORD
