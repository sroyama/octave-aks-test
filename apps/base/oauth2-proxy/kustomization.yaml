apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: octave

resources:
- oauth-deployment.yaml
- oauth-service.yaml
- oauth-secret-es.yaml
- oauth-ingress.yaml
 
labels:
  - pairs:
      octave-component: oauth2-proxy

configMapGenerator:
- name: oauth2-proxy-config
  literals:
  - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
  - OAUTH2_PROXY_PROVIDER=azure
  - OAUTH2_PROXY_OIDC_ISSUER_URL=https://login.microsoftonline.com/96c2c3ba-19d3-47b6-ba0b-8f7471bd1f14/v2.0
  - OAUTH2_PROXY_AZURE_TENANT=96c2c3ba-19d3-47b6-ba0b-8f7471bd1f14
  # Restrict access to topcon.com accounts only (per spec).
  - OAUTH2_PROXY_EMAIL_DOMAINS=topcon.com
  - OAUTH2_PROXY_REDIRECT_URL=https://octave.example.com/oauth2/callback
  - OAUTH2_PROXY_COOKIE_SECURE=true
  - OAUTH2_PROXY_COOKIE_EXPIRE=0
  - OAUTH2_PROXY_UPSTREAMS=file:///dev/null
  - OAUTH2_PROXY_SKIP_PROVIDER_BUTTON=true
  - OAUTH2_PROXY_PASS_ACCESS_TOKEN=true
  - OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER=true
  - OAUTH2_PROXY_PASS_USER_HEADERS=true
  - OAUTH2_PROXY_SET_XAUTHREQUEST=true
  - OAUTH2_PROXY_SET_AUTHORIZATION-HEADER=true
  - OAUTH2_PROXY_REVERSE_PROXY=true
  - OAUTH2_PROXY_REAL-CLIENT-IP-HEADER=X-Real-IP
