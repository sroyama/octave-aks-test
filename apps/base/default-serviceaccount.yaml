# Attaches the registry pull secret(s) to the `octave` namespace default
# ServiceAccount so every pod can pull from the dev ACR without per-deployment
# imagePullSecrets. This is credential-based (a dockerconfigjson secret synced
# from Key Vault by the acrdevglobal-es ExternalSecret), so it works for ACRs in
# any subscription or Entra tenant.
#
# To add another registry later: create another ExternalSecret that produces a
# dockerconfigjson secret, then list its name here as well.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: octave
imagePullSecrets:
- name: acrdevglobal-regcred
